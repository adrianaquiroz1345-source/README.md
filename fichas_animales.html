<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichas Recortables de Animales</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

        :root {
            --primary-color: #ff9a9e;
            --secondary-color: #fecfef;
        }

        body {
            font-family: 'Comic Neue', cursive, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ff6b81;
            text-align: center;
            font-size: 3rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        p.instructions {
            text-align: center;
            font-size: 1.2rem;
            color: #555;
            margin-bottom: 30px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }

        .card {
            background-color: white;
            border: 3px dashed #a0a0a0;
            border-radius: 15px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
            page-break-inside: avoid;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .scissors::before {
            content: "✂️";
            position: absolute;
            top: -16px;
            left: 20px;
            font-size: 1.5rem;
            background: white;
            padding: 0 10px;
        }

        .scissors::after {
            content: "✂️";
            position: absolute;
            bottom: -16px;
            right: 20px;
            font-size: 1.5rem;
            background: white;
            padding: 0 10px;
            transform: scaleX(-1);
        }

        .animal-icon {
            font-size: 7rem;
            margin-bottom: 20px;
            line-height: 1;
        }

        .animal-name {
            font-size: 2.8rem;
            color: #333;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }

        .print-button {
            margin-top: 50px;
            margin-bottom: 30px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-family: 'Comic Neue', cursive;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            color: #333;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.4);
            transition: all 0.3s ease;
        }

        .print-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 154, 158, 0.6);
        }

        @media print {
            body {
                background-color: white;
                padding: 0;
            }

            .print-button,
            h1,
            p.instructions {
                display: none;
            }

            .grid-container {
                gap: 15px;
                max-width: 100%;
            }

            .card {
                box-shadow: none;
                border-color: #000;
            }

            .scissors::before,
            .scissors::after {
                filter: grayscale(100%);
            }
        }
    </style>
</head>

<body>

    <h1>🐾 Fichas de Animales 🐾</h1>
    <p class="instructions">Pide a un adulto que te ayude a recortar por la línea punteada.</p>

    <div class="grid-container">

        <div class="card scissors">
            <div class="animal-icon">🐮</div>
            <h2 class="animal-name">Vaca</h2>
        </div>


        <div class="card scissors">
            <div class="animal-icon">🐷</div>
            <h2 class="animal-name">Cerdo</h2>
        </div>


        <div class="card scissors">
            <div class="animal-icon">🐶</div>
            <h2 class="animal-name">Perro</h2>
        </div>


        <div class="card scissors">
            <div class="animal-icon">🐱</div>
            <h2 class="animal-name">Gato</h2>
        </div>


        <div class="card scissors">
            <div class="animal-icon">🦁</div>
            <h2 class="animal-name">León</h2>
        </div>


        <div class="card scissors">
            <div class="animal-icon">🐵</div>
            <h2 class="animal-name">Mono</h2>
        </div>


        <div class="card scissors">
            <div class="animal-icon">🐘</div>
            <h2 class="animal-name">Elefante</h2>
        </div>


        <div class="card scissors">
            <div class="animal-icon">🐸</div>
            <h2 class="animal-name">Rana</h2>
        </div>
    </div>

    <button class="print-button" onclick="window.print()">🖨️ Imprimir Fichas</button>

</body>

</html>
