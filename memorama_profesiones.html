<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorama de Profesiones</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700&display=swap');

        :root {
            --primary-bg: #e0f7fa;
            --card-front: #ffb74d;
            --card-back: #ffffff;
            --text-color: #37474f;
            --success-color: #66bb6a;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            user-select: none;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: #ef5350;
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0px #fff;
        }

        p.subtitle {
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #00838f;
            text-align: center;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 650px;
            width: 100%;
        }

        /* Responsive adjustments for preschooler tablets/screens */
        @media (max-width: 800px) {
            .game-board { grid-template-columns: repeat(4, 1fr); }
        }
        @media (max-width: 500px) {
            .game-board { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            h1 { font-size: 2rem; }
        }

        .card {
            aspect-ratio: 3 / 4;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg) scale(0.95);
            box-shadow: 0 0 15px var(--success-color);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            border: 4px solid #fff;
            box-sizing: border-box;
        }

        .card-front {
            background-color: var(--card-front);
            background-image: repeating-linear-gradient(
                45deg,
                rgba(255,255,255,0.2) 0px,
                rgba(255,255,255,0.2) 20px,
                transparent 20px,
                transparent 40px
            );
            color: white;
            font-size: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Decoration for the back of the card (which is visually the front before flipping) */
        .card-front::after {
            content: '?';
            font-family: 'Fredoka One', cursive;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.8);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            padding: 10px;
            text-align: center;
        }

        .emoji {
            font-size: 4rem;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
            margin-bottom: 5px;
        }

        .name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-color);
            line-height: 1.1;
        }

        #victory-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        #victory-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .victory-title {
            font-family: 'Fredoka One', cursive;
            font-size: 4rem;
            color: var(--success-color);
            margin: 0;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #c8e6c9;
            animation: bounce 2s infinite;
        }

        .restart-btn {
            margin-top: 30px;
            font-family: 'Nunito', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background-color: #29b6f6;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #0288d1;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .restart-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0 0 #0288d1;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>Memorama de Profesiones</h1>
    <p class="subtitle">¡Encuentra los pares y aprende las profesiones!</p>

    <div class="game-board" id="game-board">
        <!-- Las cartas se generarán aquí -->
    </div>

    <div id="victory-screen">
        <h2 class="victory-title">¡Felicidades!</h2>
        <p style="font-size: 2rem; color: #455a64; margin-top: 10px;">¡Completaste el Memorama!</p>
        <button class="restart-btn" onclick="initGame()">Jugar Otra Vez</button>
    </div>

    <script>
        const profesiones = [
            { id: 1, name: "Maestra", emoji: "👩‍🏫" },
            { id: 2, name: "Doctor", emoji: "👨‍⚕️" },
            { id: 3, name: "Bombero", emoji: "👨‍🚒" },
            { id: 4, name: "Policía", emoji: "👮‍♀️" },
            { id: 5, name: "Chef", emoji: "👨‍🍳" },
            { id: 6, name: "Piloto", emoji: "👨‍✈️" },
            { id: 7, name: "Veterinaria", emoji: "👩‍⚕️" },
            { id: 8, name: "Constructora", emoji: "👷‍♀️" }
        ];

        const frasesElogio = [
            "¡Qué bien!",
            "¡Excelente!",
            "¡Muy bien hecho!",
            "¡Súper!",
            "¡Genial!",
            "¡Correcto!"
        ];

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;

        const board = document.getElementById('game-board');
        const victoryScreen = document.getElementById('victory-screen');

        // Configuración de síntesis de voz
        const synth = window.speechSynthesis;
        let vocesDisponibles = [];

        function cargarVoces() {
            vocesDisponibles = synth.getVoices();
        }

        // Asegurar que carguen las voces
        cargarVoces();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = cargarVoces;
        }

        function hablar(texto) {
            if (synth.speaking) {
                synth.cancel(); // Detener si está hablando
            }
            const utterThis = new SpeechSynthesisUtterance(texto);
            
            // Buscar una voz femenina (Sabina, Helena, Paulina, etc.)
            let vozFemenina = vocesDisponibles.find(voz => 
                voz.name.includes('Sabina') || 
                voz.name.includes('Helena') || 
                voz.name.includes('Paulina') || 
                voz.name.includes('Google español') 
            );
            
            // Fallback: tratar de buscar cualquiera en español si no halló las anteriores
            if (!vozFemenina) {
                let vocesEsp = vocesDisponibles.filter(voz => voz.lang.includes('es'));
                // Intentar buscar una que diga "female" si existe, o tomar la primera (por defecto Windows usa Sabina u otras femeninas en ES-MX)
                vozFemenina = vocesEsp.find(voz => voz.name.toLowerCase().includes('female')) || vocesEsp.find(voz => voz.lang === 'es-MX');
            }

            if (vozFemenina) {
                utterThis.voice = vozFemenina;
            } else {
                utterThis.lang = 'es-MX'; 
            }

            utterThis.rate = 0.8; // Más pausada y suave
            utterThis.pitch = 1.35; // Tono más agudo/dulce para que suene claro y amigable
            synth.speak(utterThis);
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function initGame() {
            // Reiniciar variables
            board.innerHTML = '';
            victoryScreen.classList.remove('show');
            matchedPairs = 0;
            hasFlippedCard = false;
            lockBoard = false;
            firstCard = null;
            secondCard = null;

            // Duplicar profesiones para hacer los pares (24 cartas)
            let gameCards = [...profesiones, ...profesiones];
            gameCards = shuffle(gameCards);

            // Crear el HTML de las cartas
            gameCards.forEach(profesion => {
                const cardElement = document.createElement('div');
                cardElement.classList.add('card');
                cardElement.dataset.name = profesion.name;

                cardElement.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front"></div>
                        <div class="card-face card-back">
                            <div class="emoji">${profesion.emoji}</div>
                            <div class="name">${profesion.name}</div>
                        </div>
                    </div>
                `;

                cardElement.addEventListener('click', flipCard);
                board.appendChild(cardElement);
            });
            
            // Hablar mensaje de bienvenida (opcional, requiere que el usuario haya interactuado antes, 
            // no lo pondremos automático para evitar errores en navegadores)
        }

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            // Leer el nombre de la profesión al voltear
            const profesionName = this.dataset.name;
            hablar(profesionName);

            if (!hasFlippedCard) {
                // Primer clic
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Segundo clic
            hasFlippedCard = false;
            secondCard = this;

            checkForMatch();
        }

        function checkForMatch() {
            let isMatch = firstCard.dataset.name === secondCard.dataset.name;

            if (isMatch) {
                disableCards();
                matchedPairs++;
                
                // Si es un par, que diga "¡Qué bien!" o una frase similar después de leer el segundo nombre
                setTimeout(() => {
                    const randomElogio = frasesElogio[Math.floor(Math.random() * frasesElogio.length)];
                    hablar(randomElogio);
                    
                    if (matchedPairs === profesiones.length) {
                        setTimeout(showVictory, 1000);
                    }
                }, 800); // Esperar a que termine de decir el nombre de la profesión
                
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');

                resetBoard();
            }, 1500); // Mostrar las cartas 1.5 segundos para que los niños las memoricen
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function showVictory() {
            victoryScreen.classList.add('show');
            hablar("¡Felicidades! ¡Completaste el Memorama, eres increíble!");
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];
            for(let i=0; i<100; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confetti.style.animationDelay = Math.random() * 2 + 's';
                victoryScreen.appendChild(confetti);
            }
        }

        // Iniciar el juego al cargar
        window.onload = initGame;
    </script>
</body>
</html>
